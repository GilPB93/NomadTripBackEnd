nelmio_api_doc:
    documentation:
        info:
            title: NomadTrip API
            description: This is an app to help you plan your next trip and have all the souvenirs of your passed trips in one place.
            version: 1.0.0
            contact:
                name: NomadTrip Team
                email: g.p.braga@hotmail.com
        components:
            securitySchemes:
                X-AUTH-TOKEN:
                    type: apiKey
                    in: header
                    name: X-AUTH-TOKEN
        security:
            - X-AUTH-TOKEN: []
    areas: # to filter documented areas
        path_patterns:
            - ^/api(?!/doc$) # Accepts routes under /api except /api/doc
